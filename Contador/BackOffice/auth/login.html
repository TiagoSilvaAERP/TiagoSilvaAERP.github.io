<!doctype html>
<html lang="pt">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>OesteCIM | Login</title>
        <link rel="icon" href="/assets/image/logo.ico">
        <meta name="robots" content="noindex">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Boxicons -->
        <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
        <!-- Custom CSS -->
        <link rel="stylesheet" href="assets/css/login.css">
    </head>
    <body>
        <main class="container-fluid vh-100 d-flex align-items-center justify-content-center">
            <div class="row w-100 justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="card shadow-lg overflow-hidden">
                        <div class="row g-0">
                            <div class="col-12 col-md-6 d-none d-md-flex align-items-center justify-content-center bg-primary text-white login-visual">
                                <img src="../assets/image/logo.png" alt="Login image" class="img-fluid rounded m-4" style="max-height:420px; object-fit:cover;">
                            </div>
                            <div class="col-12 col-md-6 p-4 p-md-5">
                                <div class="mb-4 text-center text-md-start">
                                    <h1 class="h3 mb-1">Login</h1>
                                    <p class="text-muted mb-0">Área reservada ao contador</p>
                                </div>

                                <form id="loginForm" class="needs-validation" novalidate>
                                    <div id="loginMessage"></div>

                                    <div class="mb-3">
                                        <label for="username" class="form-label">Utilizador</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bx bx-user"></i></span>
                                            <input type="text" class="form-control" id="username" name="username" placeholder="o teu utilizador" required>
                                            <div class="invalid-feedback">Por favor insere o utilizador.</div>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="password" class="form-label">Palavra-passe</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bx bx-lock-alt"></i></span>
                                            <input type="password" class="form-control" id="password" name="password" placeholder="A tua palavra-passe" required>
                                            <div class="invalid-feedback">Por favor insere a palavra-passe.</div>
                                        </div>
                                    </div>

                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="showPassword">
                                            <label class="form-check-label small" for="showPassword">Mostrar palavra-passe</label>
                                        </div>
                                    </div>

                                    <button class="btn btn-primary w-100" type="submit" id="loginBtn">Entrar</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="assets/js/login.js"></script>
    </body>
</html>
