<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backoffice | Mesa</title>
    <link rel="icon" href="assets/image/logo.ico">
    <meta name="robots" content="noindex">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/mesa.css">
</head>
<body class="mesa-body">
    <main class="container-fluid px-0 py-0 mesa-page">
        <div class="mesa-shell mx-auto">
            <header class="mesa-topbar mb-3">
                <div>
                    <p class="mesa-kicker mb-1">Mesa</p>
                    <h1 class="mesa-title mb-1">Níveis de assuntos</h1>
                    <p class="mesa-subtitle mb-0">Carrega em reset para desbloquear os temas e depois controla a fila dos partidos.</p>
                </div>
                <div class="mesa-userbox">
                    <div class="mesa-userchip">
                        <i class="bx bx-user-circle"></i>
                        <div>
                            <strong id="userName">Mesa</strong>
                            <small id="userRole">mesa</small>
                        </div>
                    </div>
                    <button class="btn btn-dark btn-sm" type="button" id="logoutBtn"><i class="bx bx-log-out me-1"></i>Sair</button>
                </div>
            </header>

            <div id="infoBanner" class="mb-3"></div>

            <section class="mesa-panel mesa-panel-top mb-3">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2 mb-3">
                    <div>
                        <div class="mesa-panel-label">Temas</div>
                        <h2 class="mesa-panel-title mb-0">Escolhe o nível de assunto</h2>
                    </div>
                    <button class="btn btn-outline-dark" type="button" id="resetBtn">
                        <i class="bx bx-reset me-1"></i>Reset
                    </button>
                </div>
                <div id="themeButtons" class="mesa-theme-strip"></div>
                <small id="themeHint" class="mesa-hint">Primeiro clica em reset para poderes escolher os temas.</small>
            </section>

            <section class="mesa-panel">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2 mb-3">
                    <div>
                        <div class="mesa-panel-label">Fila</div>
                        <h2 class="mesa-panel-title mb-0">Partidos</h2>
                    </div>
                    <span class="badge text-bg-light text-dark border">Tema ativo: <span id="selectedThemeLabel">Nenhum</span></span>
                </div>
                <div id="partiesGrid" class="mesa-party-grid"></div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mesa.js"></script>
</body>
</html>
