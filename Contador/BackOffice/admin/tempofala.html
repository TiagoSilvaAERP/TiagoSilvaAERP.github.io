<!doctype html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Backoffice | Tempo de Fala</title>
    <meta name="robots" content="noindex">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body data-page="tempofala">
    <div class="admin-app">
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-brand"><div class="brand-mark"><i class="bx bxs-dashboard"></i></div><div><h1>Backoffice</h1><p>Tempo de fala</p></div></div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link"><i class="bx bx-grid-alt"></i><span>Visão geral</span></a>
                <a href="partidos.html" class="nav-link"><i class="bx bx-flag"></i><span>Partidos</span></a>
                <a href="utilizadores.html" class="nav-link"><i class="bx bx-group"></i><span>Utilizadores</span></a>
                <a href="temas.html" class="nav-link"><i class="bx bx-book-content"></i><span>Temas</span></a>
                <a href="tempofala.html" class="nav-link active"><i class="bx bx-time-five"></i><span>Tempo de fala</span></a>
            </nav>
            <div class="sidebar-card"><p class="mb-1 text-uppercase small text-white-50">Sessão</p><h2 id="sidebarUserName">Admin</h2><span class="badge text-bg-light text-primary" id="sidebarUserRole">admin</span></div>
        </aside>
        <div class="admin-content">
            <header class="topbar">
                <button class="btn btn-outline-light d-lg-none" id="sidebarToggle" type="button"><i class="bx bx-menu"></i></button>
                <div><p class="topbar-kicker mb-1">Cronómetro por tema</p><h2 class="topbar-title mb-0">Tempo de fala</h2></div>
                <div class="topbar-actions"><div class="topbar-user"><i class="bx bx-user-circle"></i><div><strong id="topbarUserName">Admin</strong><small id="topbarUserRole">role: admin</small></div></div><button class="btn btn-light btn-sm" type="button" id="logoutBtn"><i class="bx bx-log-out"></i> Sair</button></div>
            </header>
            <main class="container-fluid py-4">
                <div id="accessAlert"></div>
                <section class="dashboard-section mb-4">
                    <div class="section-header"><div><p class="section-kicker mb-1">Tempo por tema</p><h3 class="section-title mb-0">Atribuir minutos por partido e tema</h3></div><span class="badge text-bg-light text-dark">Total: <span id="timeSummary">0</span></span></div>
                    <div class="row g-4 mt-1">
                        <div class="col-12 col-xl-4">
                            <div class="panel-card h-100">
                                <h4 class="panel-title"><i class="bx bx-plus"></i> Novo tempo</h4>
                                <form id="speakingTimeForm" class="row g-3">
                                    <div class="col-12"><label class="form-label" for="speakingTheme">Tema</label><select class="form-select" id="speakingTheme"></select></div>
                                    <div class="col-12"><label class="form-label" for="speakingParty">Partido</label><select class="form-select" id="speakingParty"></select></div>
                                    <div class="col-12"><label class="form-label" for="speakingMinutes">Minutos</label><input class="form-control" id="speakingMinutes" type="number" min="1" step="1" value="20"></div>
                                    <div class="col-12 d-grid"><button class="btn btn-primary" id="speakingTimeSubmitButton" type="submit"><i class="bx bx-plus"></i> Adicionar tempo</button></div>
                                    <div class="col-12 d-grid"><button class="btn btn-outline-secondary d-none" type="button" id="cancelSpeakingTimeEdit"><i class="bx bx-x"></i> Cancelar edição</button></div>
                                </form>
                                <hr>
                                <div class="d-flex flex-wrap gap-2" id="timeBadges"></div>
                            </div>
                        </div>
                        <div class="col-12 col-xl-8">
                            <div class="panel-card h-100">
                                <h4 class="panel-title"><i class="bx bx-table"></i> Tempos configurados</h4>
                                <div class="table-responsive">
                                    <table class="table align-middle table-hover users-table">
                                        <thead><tr><th>Tema</th><th>Partido</th><th>Minutos</th><th class="text-end">Ações</th></tr></thead>
                                        <tbody id="tempofalaTable"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/admin.js"></script>
</body>
</html>
